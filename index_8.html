<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MT Interview Scorecard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0f0f;color:#e8e8e8;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;}
.app{max-width:900px;margin:0 auto;padding:1.5rem 1rem;}
.header{margin-bottom:1.5rem;}
.header h1{font-size:20px;font-weight:500;color:#f0f0f0;}
.header p{font-size:13px;color:#666;margin-top:4px;}
.nav-main{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;}
.tab{background:#1a1a1a;border:0.5px solid #2e2e2e;border-radius:8px;color:#888;cursor:pointer;font-size:13px;padding:7px 16px;transition:all 0.15s;}
.tab.active{background:#1d3a5f;border-color:#2a5a9f;color:#9fc8f0;}
.tab:hover:not(.active){border-color:#444;color:#ccc;}
.view{display:none;}
.view.active{display:block;}
.section-label{font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}
.card{background:#1a1a1a;border:0.5px solid #2e2e2e;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.rater-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.rater-btn{background:#1e1e1e;border:0.5px solid #2e2e2e;border-radius:10px;color:#888;cursor:pointer;padding:14px 8px;text-align:center;transition:all 0.15s;}
.rater-btn:hover{border-color:#444;color:#ccc;}
.rater-btn.selected{background:#1d3a5f;border-color:#4a90d9;color:#9fc8f0;}
.rater-btn .initials{font-size:22px;font-weight:500;display:block;margin-bottom:4px;}
.rater-btn .rname{font-size:12px;}
.weights-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.wlabel{font-size:13px;color:#ccc;flex:1;}
.wval{font-size:13px;font-weight:500;width:38px;text-align:right;}
input[type=range]{flex:0 0 150px;accent-color:#4a90d9;}
.btn{background:#252525;border:0.5px solid #333;border-radius:8px;color:#e8e8e8;cursor:pointer;font-size:13px;padding:8px 16px;transition:background 0.15s;}
.btn:hover{background:#303030;}
.btn-primary{background:#1d3a5f;border-color:#2a5a9f;color:#9fc8f0;}
.btn-primary:hover{background:#244a78;}
.btn-success{background:#1a3a1f;border-color:#2a6a30;color:#7fd090;}
.btn-success:hover{background:#224528;}
.btn-danger{background:#3a1515;border-color:#6b2020;color:#e06060;}
.candidate-section{background:#1a1a1a;border:0.5px solid #2e2e2e;border-radius:12px;margin-bottom:1rem;overflow:hidden;}
.cand-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;cursor:pointer;user-select:none;}
.cand-header:hover{background:#1e1e1e;}
.cand-name{font-size:15px;font-weight:500;color:#e0e0e0;}
.cand-body{border-top:0.5px solid #2e2e2e;padding:1.25rem;display:none;}
.cand-body.open{display:block;}
.pillar-block{margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:0.5px solid #252525;}
.pillar-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.pillar-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.pillar-name{font-size:14px;font-weight:500;color:#e0e0e0;}
.pillar-sub{font-size:12px;color:#555;margin-top:2px;}
.score-disp{font-size:22px;font-weight:500;color:#4a90d9;min-width:24px;text-align:right;}
.score-btn-wrap{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.score-btn-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.sbtn{border-radius:8px;cursor:pointer;font-size:15px;font-weight:500;padding:12px 0;width:100%;text-align:center;transition:all 0.12s;border:0.5px solid transparent;}
.sbtn:hover{filter:brightness(1.2);}
.sbtn-label{font-size:10px;color:#555;text-align:center;line-height:1.2;min-height:14px;}
.s1-base{background:#2a1010;border-color:#6b2020;color:#e06060;}
.s2-base{background:#281808;border-color:#6a3510;color:#d07040;}
.s3-base{background:#221e08;border-color:#5a5010;color:#b8a840;}
.s4-base{background:#1a1a1a;border-color:#404040;color:#888;}
.s5-base{background:#1a1a1a;border-color:#404040;color:#888;}
.s6-base{background:#0e2010;border-color:#1e5020;color:#60b870;}
.s7-base{background:#0a2008;border-color:#1a6015;color:#50d060;}
.s1-sel{background:#3a1515;border-color:#c03030;color:#ff8080;box-shadow:0 0 0 2px #c0303044;}
.s2-sel{background:#3a2008;border-color:#c06020;color:#ff9050;box-shadow:0 0 0 2px #c0602044;}
.s3-sel{background:#302808;border-color:#a09020;color:#e8d060;box-shadow:0 0 0 2px #a0902044;}
.s4-sel{background:#282828;border-color:#707070;color:#c0c0c0;box-shadow:0 0 0 2px #70707044;}
.s5-sel{background:#282828;border-color:#707070;color:#c0c0c0;box-shadow:0 0 0 2px #70707044;}
.s6-sel{background:#103018;border-color:#30a040;color:#80e898;box-shadow:0 0 0 2px #30a04044;}
.s7-sel{background:#0c3010;border-color:#28c030;color:#60ff70;box-shadow:0 0 0 2px #28c03044;}
.notes-field{background:#111;border:0.5px solid #2e2e2e;border-radius:8px;color:#ccc;font-size:13px;margin-top:10px;outline:none;padding:8px 10px;resize:none;width:100%;}
.notes-field:focus{border-color:#444;}
.submit-bar{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;padding-top:1rem;border-top:0.5px solid #252525;}
.prog-text{font-size:13px;color:#666;}
.locked-badge{background:#1a3020;border:0.5px solid #2a5030;border-radius:6px;color:#60c080;font-size:12px;padding:4px 10px;}
.warn-box{background:#2a1a0a;border:0.5px solid #5a3a10;border-radius:8px;color:#c89040;font-size:13px;padding:10px 14px;margin-bottom:1rem;}
.info-box{background:#0f1e30;border:0.5px solid #1e4060;border-radius:8px;color:#70a8d0;font-size:13px;padding:10px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.results-card{background:#1a1a1a;border:0.5px solid #2e2e2e;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.results-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;}
.comp-score{font-size:28px;font-weight:500;color:#9090f0;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.bar-label{font-size:12px;color:#888;width:195px;flex-shrink:0;}
.bar-track{flex:1;background:#252525;border-radius:4px;height:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.bar-val{font-size:12px;width:28px;text-align:right;}
.bar-row.sorted-pillar .bar-label{color:#9fc8f0;}
.bar-row.sorted-pillar .bar-val{color:#9fc8f0;font-weight:500;}
.rater-breakdown{margin-top:12px;border-top:0.5px solid #252525;padding-top:12px;}
.rater-grid-r{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.rater-cell{background:#1e1e1e;border:0.5px solid #2e2e2e;border-radius:8px;padding:8px 10px;}
.rater-cell-name{font-size:11px;color:#666;margin-bottom:4px;}
.rater-cell-score{font-size:16px;font-weight:500;}
.pill-sm{font-size:10px;padding:2px 5px;border-radius:4px;color:#888;background:#252525;border:0.5px solid #333;display:inline-block;margin:2px 2px 0 0;}
.expand-btn{background:#1e1e1e;border:0.5px solid #2e2e2e;border-radius:7px;color:#888;cursor:pointer;font-size:12px;padding:5px 10px;margin-top:10px;width:100%;text-align:center;}
.expand-btn:hover{border-color:#444;color:#ccc;}
.detail-body{margin-top:10px;display:none;}
.detail-body.open{display:block;}
.sort-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.sort-label{font-size:12px;color:#666;margin-right:2px;}
.sort-btn{background:#1e1e1e;border:0.5px solid #2e2e2e;border-radius:7px;color:#888;cursor:pointer;font-size:12px;padding:6px 12px;transition:all 0.12s;white-space:nowrap;}
.sort-btn:hover{border-color:#444;color:#ccc;}
.sort-btn.active{background:#1d3a5f;border-color:#4a90d9;color:#9fc8f0;}
.lb-row{display:flex;align-items:center;gap:12px;background:#1e1e1e;border:0.5px solid #2e2e2e;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.lb-rank{font-size:20px;font-weight:500;color:#555;width:28px;flex-shrink:0;}
.lb-rank.r1{color:#c8a830;}
.lb-rank.r2{color:#909090;}
.lb-rank.r3{color:#8a5a30;}
.lb-name{font-size:15px;font-weight:500;color:#e0e0e0;flex:1;}
.lb-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.lb-pill{font-size:11px;padding:2px 7px;border-radius:4px;background:#252525;border:0.5px solid #333;color:#888;}
.lb-pill.hl{border-color:#4a90d9;color:#9fc8f0;background:#1d3a5f;}
.lb-score{font-size:20px;font-weight:500;color:#9090f0;}
.chip{font-size:12px;padding:4px 10px;border-radius:6px;}
.chip.done{background:#1a3020;border:0.5px solid #2a5030;color:#60c080;}
.chip.pending{background:#252525;border:0.5px solid #333;color:#666;}
.divider{height:0.5px;background:#252525;margin:1.5rem 0;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #333;border-top-color:#4a90d9;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.sync-status{font-size:12px;color:#666;display:flex;align-items:center;gap:6px;margin-top:8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#60c080;flex-shrink:0;}
.sync-dot.syncing{background:#c8a830;animation:pulse 1s infinite;}
.sync-dot.error{background:#c03030;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@media(max-width:560px){.rater-grid{grid-template-columns:repeat(2,1fr);}input[type=range]{flex:0 0 100px;}.rater-grid-r{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Massage therapist interview scorecard</h1>
    <p>Select your name, score each candidate, then submit. Results unlock once all 4 raters submit.</p>
  </div>

  <div class="nav-main" id="mainNav">
    <div class="tab active" onclick="switchView('setup')">Setup</div>
    <div class="tab" onclick="switchView('score')">Score</div>
    <div class="tab" onclick="switchView('results')">Results</div>
  </div>

  <div class="view active" id="view-setup">
    <p class="section-label">Who are you?</p>
    <div class="card">
      <div class="rater-grid" id="raterGrid"></div>
    </div>
    <div style="height:12px;"></div>
    <p class="section-label">Pillar weights — must total 100%</p>
    <div class="card" id="weightsCard"></div>
    <div style="height:12px;"></div>
    <button class="btn btn-primary" onclick="goScore()" style="width:100%;">Continue to scoring ›</button>
  </div>

  <div class="view" id="view-score">
    <div id="raterBanner" style="margin-bottom:1rem;"></div>
    <div id="scoreSections"></div>
  </div>

  <div class="view" id="view-results">
    <div id="resultsArea"></div>
  </div>
</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzkZA-Lwl6_2z3mazXOgXVE3ytEMibpTeVGbJtdgIHw1WYpNpIV9btU0HJErt1-d4GBxA/exec';

const RATERS = [
  {id:'drew',   name:'Drew',   initials:'DY'},
  {id:'dani',   name:'Dani',   initials:'DL'},
  {id:'long',   name:'Long',   initials:'LL'},
  {id:'nadine', name:'Nadine', initials:'NT'},
];
const CANDIDATES = ['Stephanie Weston','Katie Babcock','CassyAna Bovyer','Amy Murry','Anne Valta','Yuki Jitoshi'];
const PILLARS = [
  {key:'clinical',         name:'Clinical competency',              sub:'Hands-on technique · modality breadth · understanding of skills'},
  {key:'team',             name:'Performance team fit',              sub:'Multidisciplinary collaboration · communication · no ego or hero mindset'},
  {key:'character',        name:'Personality / character',           sub:'Integrity · trustworthy · fit with our athletes'},
  {key:'logistics',        name:'Logistical / schedule fit',         sub:'Anticipated schedule handling · adaptability · flexibility'},
  {key:'professionalism',  name:'Professionalism / self-awareness',  sub:'Discretion & confidentiality · scope of practice · personal conduct'},
];
const BTN_BASE = ['','s1-base','s2-base','s3-base','s4-base','s5-base','s6-base','s7-base'];
const BTN_SEL  = ['','s1-sel', 's2-sel', 's3-sel', 's4-sel', 's5-sel', 's6-sel', 's7-sel'];
const BTN_LABELS = ['','Bad','','','Average','','','Elite'];

let state = {
  activeRater: null,
  weights: {clinical:20,team:20,character:20,logistics:20,professionalism:20},
  scores: {},
  open: {},
};

let remoteScores = [];
let syncState = 'idle';
let sortKey = 'composite';
let openCards = {};

function save(){ try{ localStorage.setItem('mtsc_gh', JSON.stringify(state)); }catch(e){} }
function loadLocal(){ try{ const d=localStorage.getItem('mtsc_gh'); if(d) state=JSON.parse(d); }catch(e){} }
loadLocal();

function sk(c,r){ return c+'||'+r; }

function switchView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('#mainNav .tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  ['setup','score','results'].forEach((n,i)=>{ if(n===v) document.querySelectorAll('#mainNav .tab')[i].classList.add('active'); });
  if(v==='results'){ fetchAndRenderResults(); }
  if(v==='score'){ renderScorePage(); }
}

/* ── SETUP ── */
function renderRaterGrid(){
  document.getElementById('raterGrid').innerHTML = RATERS.map(r=>`
    <div class="rater-btn${state.activeRater===r.id?' selected':''}" onclick="selectRater('${r.id}')">
      <span class="initials">${r.initials}</span>
      <span class="rname">${r.name}</span>
    </div>`).join('');
}
function selectRater(id){ state.activeRater=id; save(); renderRaterGrid(); }

function weightTotal(){ return PILLARS.reduce((s,p)=>s+state.weights[p.key],0); }
function renderWeights(){
  document.getElementById('weightsCard').innerHTML =
    PILLARS.map(p=>`<div class="weights-row">
      <span class="wlabel">${p.name}</span>
      <input type="range" min="5" max="50" step="5" value="${state.weights[p.key]}" oninput="updateW('${p.key}',this.value)"/>
      <span class="wval" id="wv-${p.key}">${state.weights[p.key]}%</span>
    </div>`).join('')
    +`<div style="font-size:13px;color:#666;margin-top:8px;">Total: <span id="wtot" style="font-weight:500;">${weightTotal()}%</span></div>`;
  styleWTotal();
}
function updateW(key,val){
  state.weights[key]=parseInt(val);
  document.getElementById('wv-'+key).textContent=val+'%';
  styleWTotal(); save();
}
function styleWTotal(){
  const t=weightTotal();
  const el=document.getElementById('wtot');
  if(el){ el.textContent=t+'%'; el.style.color=t===100?'#60c080':'#f08080'; }
  document.querySelectorAll('.wval').forEach(el=>{ el.style.color=t===100?'#60c080':'#f08080'; });
}
function goScore(){
  if(!state.activeRater){ alert('Please select your name first.'); return; }
  if(weightTotal()!==100){ alert('Pillar weights must total 100%.'); return; }
  switchView('score');
}

/* ── SCORE ── */
function renderScorePage(){
  const rater = RATERS.find(r=>r.id===state.activeRater);
  const banner = document.getElementById('raterBanner');
  if(!rater){
    banner.innerHTML=`<div class="warn-box">Go to Setup and select your name first.</div>`;
    document.getElementById('scoreSections').innerHTML='';
    return;
  }
  banner.innerHTML=`<div style="display:flex;align-items:center;gap:10px;">
    <div style="width:36px;height:36px;border-radius:50%;background:#1d3a5f;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#9fc8f0;">${rater.initials}</div>
    <div><div style="font-size:15px;font-weight:500;color:#e0e0e0;">Scoring as ${rater.name}</div><div style="font-size:12px;color:#666;">Rate all 6 candidates, then submit each one</div></div>
    <button class="btn" onclick="switchView('setup')" style="margin-left:auto;font-size:12px;padding:6px 12px;">Change</button>
  </div>`;
  document.getElementById('scoreSections').innerHTML = CANDIDATES.map(c=>buildCandSection(c,rater.id)).join('');
}

function buildCandSection(candidate, raterId){
  const key = sk(candidate,raterId);
  const existing = state.scores[key]||{};
  const submitted = existing.submitted;
  const scored = PILLARS.filter(p=>(existing[p.key]||{}).score).length;
  const cid = candidate.replace(/ /g,'_');
  const isOpen = state.open[candidate];
  const statusText = submitted
    ? `<span style="color:#60c080;font-size:12px;">✓ Submitted</span>`
    : `<span style="color:#666;font-size:12px;">${scored} / ${PILLARS.length} scored</span>`;

  let body='';
  if(submitted){
    body=`<div class="warn-box" style="margin-bottom:0;">🔒 Your scores for ${candidate} are locked and saved to the sheet. Results appear once all 4 raters submit.</div>`;
  } else {
    body = PILLARS.map(p=>{
      const sc=(existing[p.key]||{}).score||0;
      const notes=(existing[p.key]||{}).notes||'';
      const btns=[1,2,3,4,5,6,7].map(n=>{
        const isSel=sc===n;
        const lbl=BTN_LABELS[n]?`<div class="sbtn-label">${BTN_LABELS[n]}</div>`:`<div class="sbtn-label"></div>`;
        return `<div class="score-btn-col">
          <button class="sbtn ${isSel?BTN_SEL[n]:BTN_BASE[n]}" onclick="setScore('${candidate}','${raterId}','${p.key}',${n})" id="sb-${cid}-${p.key}-${n}">${n}</button>
          ${lbl}
        </div>`;
      }).join('');
      return `<div class="pillar-block">
        <div class="pillar-header">
          <div><div class="pillar-name">${p.name}</div><div class="pillar-sub">${p.sub}</div></div>
          <div class="score-disp" id="sd-${cid}-${p.key}">${sc||'—'}</div>
        </div>
        <div class="score-btn-wrap">${btns}</div>
        <textarea class="notes-field" rows="2" placeholder="Notes..." id="nt-${cid}-${p.key}" onblur="saveNote('${candidate}','${raterId}','${p.key}',this.value)">${notes}</textarea>
      </div>`;
    }).join('');
    const allDone = PILLARS.every(p=>(existing[p.key]||{}).score);
    body+=`<div class="submit-bar">
      <span class="prog-text" id="prog-${cid}">${scored} / ${PILLARS.length} pillars scored</span>
      <button class="btn btn-success" onclick="submitScores('${candidate}','${raterId}')" ${allDone?'':'disabled'} id="subBtn-${cid}">Submit & save ›</button>
    </div>`;
  }

  return `<div class="candidate-section" id="csec-${cid}">
    <div class="cand-header" onclick="toggleCand('${candidate}')">
      <div class="cand-name">${candidate}</div>
      <div style="display:flex;align-items:center;gap:10px;">${statusText}
        <span style="color:#555;font-size:18px;transition:transform 0.2s;display:inline-block;transform:${isOpen?'rotate(180deg)':'rotate(0deg)'}" id="chev-${cid}">⌄</span>
      </div>
    </div>
    <div class="cand-body${isOpen?' open':''}" id="cbody-${cid}">${body}</div>
  </div>`;
}

function toggleCand(candidate){
  state.open[candidate]=!state.open[candidate]; save();
  const cid=candidate.replace(/ /g,'_');
  const body=document.getElementById('cbody-'+cid);
  const chev=document.getElementById('chev-'+cid);
  if(body) body.classList.toggle('open',state.open[candidate]);
  if(chev) chev.style.transform=state.open[candidate]?'rotate(180deg)':'rotate(0deg)';
}

function setScore(candidate,raterId,pillar,score){
  const key=sk(candidate,raterId);
  if(!state.scores[key]) state.scores[key]={};
  if(!state.scores[key][pillar]) state.scores[key][pillar]={};
  state.scores[key][pillar].score=score; save();
  const cid=candidate.replace(/ /g,'_');
  const sd=document.getElementById('sd-'+cid+'-'+pillar);
  if(sd) sd.textContent=score;
  [1,2,3,4,5,6,7].forEach(n=>{
    const btn=document.getElementById('sb-'+cid+'-'+pillar+'-'+n);
    if(btn) btn.className='sbtn '+(n===score?BTN_SEL[n]:BTN_BASE[n]);
  });
  const scored=PILLARS.filter(p=>(state.scores[key][p.key]||{}).score).length;
  const prog=document.getElementById('prog-'+cid);
  if(prog) prog.textContent=scored+' / '+PILLARS.length+' pillars scored';
  const sub=document.getElementById('subBtn-'+cid);
  if(sub) sub.disabled=!PILLARS.every(p=>(state.scores[key][p.key]||{}).score);
}

function saveNote(candidate,raterId,pillar,val){
  const key=sk(candidate,raterId);
  if(!state.scores[key]) state.scores[key]={};
  if(!state.scores[key][pillar]) state.scores[key][pillar]={};
  state.scores[key][pillar].notes=val; save();
}

async function submitScores(candidate, raterId){
  const key=sk(candidate,raterId);
  const cid=candidate.replace(/ /g,'_');
  PILLARS.forEach(p=>{
    const el=document.getElementById('nt-'+cid+'-'+p.key);
    if(el && state.scores[key]?.[p.key]) state.scores[key][p.key].notes=el.value;
  });

  const btn=document.getElementById('subBtn-'+cid);
  if(btn){ btn.disabled=true; btn.textContent='Saving...'; }

  const rows=PILLARS.map(p=>({
    rater: raterId,
    candidate: candidate,
    pillar: p.key,
    score: state.scores[key]?.[p.key]?.score||0,
    notes: state.scores[key]?.[p.key]?.notes||''
  }));

  try{
    await fetch(SHEETS_URL, {
      method:'POST',
      body: JSON.stringify({scores:rows}),
    });
    state.scores[key].submitted=true; save();
    const sec=document.getElementById('csec-'+cid);
    if(sec) sec.outerHTML=buildCandSection(candidate,raterId);
  } catch(err){
    alert('Error saving to Google Sheets. Check your connection and try again.');
    if(btn){ btn.disabled=false; btn.textContent='Submit & save ›'; }
  }
}

/* ── RESULTS ── */
async function fetchAndRenderResults(){
  const area=document.getElementById('resultsArea');
  area.innerHTML=`<div class="info-box"><span class="spinner"></span> Loading scores from Google Sheets...</div>`;
  try{
    const res=await fetch(SHEETS_URL+'?t='+Date.now());
    const data=await res.json();
    remoteScores=data.scores||[];
    renderResults();
  } catch(err){
    area.innerHTML=`<div class="warn-box">⚠ Could not load scores. Check your connection and try again.<br><br><button class="btn" onclick="fetchAndRenderResults()" style="margin-top:8px;">Retry</button></div>`;
  }
}

function getRemoteScore(candidate,raterId,pillarKey){
  const row=remoteScores.find(r=>r.candidate===candidate&&r.rater===raterId&&r.pillar===pillarKey);
  return row?parseInt(row.score):null;
}
function raterSubmittedAll(candidate,raterId){
  return PILLARS.every(p=>getRemoteScore(candidate,raterId,p.key)!==null);
}
function computeRemoteComposite(candidate){
  const pillarAvgs={};
  PILLARS.forEach(p=>{
    const sc=RATERS.map(r=>getRemoteScore(candidate,r.id,p.key)).filter(s=>s!==null);
    pillarAvgs[p.key]=sc.length?sc.reduce((a,b)=>a+b,0)/sc.length:null;
  });
  const t=PILLARS.reduce((s,p)=>s+state.weights[p.key],0);
  const allHave=PILLARS.every(p=>pillarAvgs[p.key]!==null);
  const composite=allHave?PILLARS.reduce((s,p)=>s+pillarAvgs[p.key]*(state.weights[p.key]/t),0):null;
  const raterComposites={};
  RATERS.forEach(r=>{
    if(!raterSubmittedAll(candidate,r.id)){ raterComposites[r.id]=null; return; }
    const t2=PILLARS.reduce((s,p)=>s+state.weights[p.key],0);
    raterComposites[r.id]=PILLARS.reduce((s,p)=>{
      const sc=getRemoteScore(candidate,r.id,p.key)||0;
      return s+sc*(state.weights[p.key]/t2);
    },0);
  });
  return{pillarAvgs,composite,raterComposites};
}

function barColor(avg){
  if(avg<3) return'#c03030';
  if(avg<4.5) return'#a09020';
  if(avg<6) return'#208040';
  return'#28c030';
}
function scoreColor(s){
  if(s<3) return'#e06060';
  if(s<4.5) return'#c8b040';
  if(s<6) return'#60b870';
  return'#50d060';
}

function getSortVal(c){
  return sortKey==='composite'?c.composite:c.pillarAvgs[sortKey];
}
function setSort(key){
  sortKey=key;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('rsb-'+key);
  if(el) el.classList.add('active');
  renderResults();
}

function renderResults(){
  const area=document.getElementById('resultsArea');
  const all=CANDIDATES.map(c=>({name:c,...computeRemoteComposite(c)}));
  const scored=all.filter(c=>c.composite!==null);
  const sorted=[...scored].sort((a,b)=>(getSortVal(b)||0)-(getSortVal(a)||0));

  const totalRatersSubmitted=RATERS.filter(r=>CANDIDATES.some(c=>raterSubmittedAll(c,r.id))).length;

  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <div style="font-size:13px;color:#666;">${remoteScores.length} score entries loaded from Google Sheets</div>
    <button class="btn" onclick="fetchAndRenderResults()" style="font-size:12px;padding:5px 12px;">↻ Refresh</button>
  </div>`;

  html+=`<div class="sort-bar">
    <span class="sort-label">Sort by</span>
    <button class="sort-btn${sortKey==='composite'?' active':''}" id="rsb-composite" onclick="setSort('composite')">Composite</button>
    ${PILLARS.map(p=>`<button class="sort-btn${sortKey===p.key?' active':''}" id="rsb-${p.key}" onclick="setSort('${p.key}')">${p.name.split(' ')[0]}</button>`).join('')}
  </div>`;

  if(sorted.length>0){
    html+=`<p class="section-label">Leaderboard</p>`;
    sorted.forEach((c,i)=>{
      const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
      const val=getSortVal(c)||0;
      const pills=PILLARS.map(p=>`<span class="lb-pill${p.key===sortKey?' hl':''}">${p.name.split(' ')[0]}: ${c.pillarAvgs[p.key]!==null?c.pillarAvgs[p.key].toFixed(1):'—'}</span>`).join('');
      html+=`<div class="lb-row">
        <div class="lb-rank ${rc}">${i+1}</div>
        <div style="flex:1;"><div class="lb-name">${c.name}</div><div class="lb-pills">${pills}</div></div>
        <div style="text-align:right;"><div class="lb-score">${val.toFixed(2)}</div><div style="font-size:11px;color:#666;">${sortKey==='composite'?'composite':PILLARS.find(p=>p.key===sortKey)?.name.split(' ')[0]}</div></div>
      </div>`;
    });
    html+=`<div class="divider"></div>`;
  }

  html+=`<p class="section-label">Candidate breakdowns</p>`;
  const displayOrder = sorted.length>0 ? sorted.map(c=>c.name) : CANDIDATES;
  const allData = Object.fromEntries(all.map(c=>[c.name,c]));

  displayOrder.forEach(cname=>{
    const c=allData[cname];
    if(!c) return;
    const doneRaters=RATERS.filter(r=>raterSubmittedAll(cname,r.id));
    const pendingRaters=RATERS.filter(r=>!raterSubmittedAll(cname,r.id));
    html+=`<div class="results-card">
      <div class="results-top">
        <div>
          <div style="font-size:17px;font-weight:500;color:#f0f0f0;">${cname}</div>
          <div style="font-size:12px;color:#666;margin-top:4px;">${doneRaters.length} / 4 raters submitted</div>
        </div>
        ${c.composite!==null
          ?`<div><div class="comp-score">${c.composite.toFixed(2)}</div><div style="font-size:11px;color:#666;text-align:right;">weighted composite</div></div>`
          :`<div style="font-size:13px;color:#666;">Awaiting submissions</div>`}
      </div>`;

    if(c.composite!==null){
      PILLARS.forEach(p=>{
        const avg=c.pillarAvgs[p.key];
        const pct=avg!==null?(avg/7*100).toFixed(1):0;
        const isSorted=p.key===sortKey;
        html+=`<div class="bar-row${isSorted?' sorted-pillar':''}">
          <div class="bar-label">${p.name}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColor(avg)};"></div></div>
          <div class="bar-val" style="color:${isSorted?'#9fc8f0':barColor(avg)};">${avg!==null?avg.toFixed(1):'—'}</div>
        </div>`;
      });
      html+=`<button class="expand-btn" id="dbtn-${cname.replace(/ /g,'_')}" onclick="toggleDetail('${cname}')">Show rater detail</button>
        <div class="detail-body${openCards[cname]?' open':''}" id="detail-${cname.replace(/ /g,'_')}">
          <div class="rater-breakdown">
            <div class="section-label" style="margin-bottom:10px;">Individual rater scores</div>
            <div class="rater-grid-r">`;
      RATERS.forEach(r=>{
        const rc=c.raterComposites[r.id];
        html+=`<div class="rater-cell">
          <div class="rater-cell-name">${r.name} (${r.initials})</div>
          ${rc!==null?`<div class="rater-cell-score" style="color:${scoreColor(rc)};">${rc.toFixed(2)}</div>`:`<div style="font-size:12px;color:#555;">pending</div>`}`;
        PILLARS.forEach(p=>{
          const sc=getRemoteScore(cname,r.id,p.key);
          if(sc!==null) html+=`<span class="pill-sm" style="color:${scoreColor(sc)};">${p.name[0]}:${sc}</span>`;
        });
        html+=`</div>`;
      });
      html+=`</div></div></div>`;
    } else {
      html+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">
        ${doneRaters.map(r=>`<span class="chip done">✓ ${r.name}</span>`).join('')}
        ${pendingRaters.map(r=>`<span class="chip pending">${r.name}</span>`).join('')}
      </div>`;
    }
    html+=`</div>`;
  });

  if(scored.length===0){
    html+=`<div style="font-size:14px;color:#666;margin-top:1rem;">No completed submissions yet. Results appear once all 4 raters have submitted for at least one candidate.</div>`;
  }
  area.innerHTML=html;
}

function toggleDetail(name){
  openCards[name]=!openCards[name];
  const el=document.getElementById('detail-'+name.replace(/ /g,'_'));
  const btn=document.getElementById('dbtn-'+name.replace(/ /g,'_'));
  if(el) el.classList.toggle('open',openCards[name]);
  if(btn) btn.textContent=openCards[name]?'Hide rater detail':'Show rater detail';
}

renderRaterGrid();
renderWeights();
</script>
